<!DOCTYPE html>
<html lang="pt">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="description" content="HomePage de WebSite dedicado a Banda Canadiana NickelBack, incluido Historico da Banda, os membros da Banda, Discografia, Concertos, Contactos, com Recurso a HTML e CSS">
        <meta name="author" content="Catalina Gonçalves">
        <meta name="keywords" content="NickelBack, Banda, Discografia, Concertos, Contactos">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1" crossorigin="anonymous">

        <title>NickelBack WebPage - Historico, Banda, Discografia, Concertos, Contactos</title>

        <script src="https://kit.fontawesome.com/ccc0b67d15.js" crossorigin="anonymous"></script>
        
        <link rel="stylesheet" href="CSS_File.css">
        
        <style>
            @font-face {
                font-family: GroovedPersonalUseRegular-9Y350;
                src: url(Font_Rock/GroovedPersonalUseRegular-9Y350.ttf);
                }
        </style>

    </head>

    <body>
        <nav class="navbar fixed-top navbar-expand-lg navbar-light Menu">
            <div class="container-fluid">
                <a class="navbar-brand" href="NickelBack_Home_Page.html"></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                      <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="NickelBack_Home_Page.html">Home</a>
                      </li>
                      <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="NickelBack_Banda_Page.html" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                          A Banda
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                          <li><a class="dropdown-item" href="NickelBack_Banda_Page.html" target="_blank">Chad Kroeger</a></li>
                          <li><a class="dropdown-item" href="NickelBack_Banda_Page.html" target="_blank">Ryan Peake</a></li>
                          <li><a class="dropdown-item" href="NickelBack_Banda_Page.html" target="_blank">Myke Kroeger</a></li>
                          <li><a class="dropdown-item" href="NickelBack_Banda_Page.html" target="_blank">Daniel Adair</a></li>
                        </ul>
                      </li>
                      <li class="nav-item">
                        <a class="nav-link" href="NickelBack_Discografia_Page.html" target="_blank">Discografia</a>
                      </li>
                      <li class="nav-item">
                        <a class="nav-link" href="NickelBack_Concertos_Page.html" target="_blank">Concertos</a>
                      </li>
                    </ul>
                    <form class="d-flex">
                      <input class="form-control me-2" type="search" placeholder="" aria-label="Search">
                      <button class="btn btn-outline-white" type="submit"><i class="fa-solid fa-magnifying-glass"></i></button>
                    </form>
                </div>
            </div>
        </nav>

        <br>

        <div class="container-fluid text-center" id="Logo_Inicial">
            <div class="row" id="Logo">
                <img src="Pictures/Nickelback-Logo.png" class="Img-logo" alt="Logo NickelBack" title="Logo NickelBack">
            </div>
        </div>

        <div class="Cartaz">
            <a href="https://nickelback.com/pages/upcoming-dates" target="_blank"><img class="Img_Cartaz" src="Pictures/Next_Tour.jpeg" alt="Cartaz Proximo Concerto" title="Cartaz Proximo Concerto"></a>
        </div>

        <div class="container-fluid">
            <div class="row Nome_Cabeçalho" id="Contacto_Header">
                <div class="col-sm-12">
                    <h2> Contactos </h2>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-3">
                    <p class="Dado_Contacto"><span class="Cabecalho"> Morada: </span><br><span class="Conteudo">Burleson Road, Suite H<br>Austin Texas, USA</span></p>
                </div>
                <div class="col-sm-3">
                    <p class="Dado_Contacto"><span class="Cabecalho"> Enviar e-mail: </span><br><a id="Mailto" href="mailto:customercare@mainfactorcommerce.com"><span class="Conteudo">NickelBack Email</span></a></p>
                </div>
                <div class="col-sm-3">
                    <p class="Dado_Contacto"><span class="Cabecalho"> Redes Sociais: </span></p>
                    <a class="Redes_Sociais" href="https://www.facebook.com/Nickelback" target="_blank"><i class="fa-brands fa-facebook-f"></i></a>
                    <a class="Redes_Sociais" href="https://www.instagram.com/nickelback/" target="_blank"><i class="fa-brands fa-instagram"></i></a>
                    <a class="Redes_Sociais" href="https://twitter.com/nickelback" target="_blank"><i class="fa-brands fa-square-twitter"></i></a>
                    <a class="Redes_Sociais" href="https://open.spotify.com/artist/6deZN1bslXzeGvOLaLMOIF" target="_blank"><i class="fa-brands fa-spotify"></i></a>
                </div>
                <div class="col-sm-3">
                    <p class="Dado_Contacto"><span class="Cabecalho"> Enviar Mensagem: </span></p>
                    <form class="row g-3 needs-validation" novalidate>
                        <div class="col-6">
                          <input type="text" class="form-control" id="validationCustom01" value="Nome ..." required>
                        </div>
                        <div class="col-6">
                          <input type="email" class="form-control" id="validationCustom02" value="Email ..." required>
                        </div>
                        <div class="col-md-12">
                          <input type="text" class="form-control" id="validationCustom03" value="Mensagem ..." required>
                        </div>
                        <div class="col-3">
                          <button class="btn btn-primary" type="submit">Enviar</button>
                        </div>
                        <div class="col-3">
                            <button class="btn btn-primary" type="reset">Apagar</button>
                        </div>
                      </form>
                </div>
            </div>
        </div>


        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.bundle.min.js" integrity="sha384-ygbV9kiqUc6oa4msXn9868pTtWMgiQaeYH7/t7LECLbyPA2x65Kgf80OJFdroafW" crossorigin="anonymous"></script>

    </body>
</html>
